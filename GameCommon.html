<script>
/**
 * Tiện ích UI dùng chung cho mọi game.
 * File này đã có thẻ <script> — include bằng <?!= include('GameCommon'); ?> (KHÔNG bọc thêm <script>).
 */
var WewinGameUI = (function () {
  var CORRECT_MAX = 200;
  var AUTO_DELAY_MS = 1500;

  function formatNum(n) {
    return Number(n || 0).toLocaleString('vi-VN');
  }

  function getMaxScore(unitCount) {
    return Math.max(0, Number(unitCount) || 0) * CORRECT_MAX;
  }

  function countExerciseUnits(exercises) {
    if (!exercises || !exercises.length) return 0;
    var total = 0;
    for (var i = 0; i < exercises.length; i++) {
      var ex = exercises[i];
      total += (ex.items && ex.items.length) ? ex.items.length : 1;
    }
    return total;
  }

  function updateScoreBar(opts) {
    opts = opts || {};
    var sessionScore = Number(opts.sessionScore) || 0;
    var maxScore = Number(opts.maxScore) || 0;
    var pct = maxScore > 0 ? Math.min(100, (sessionScore / maxScore) * 100) : 0;
    if (opts.fillEl) opts.fillEl.style.width = pct + '%';
    var label = formatNum(sessionScore) + '/' + formatNum(maxScore) + ' điểm';
    if (opts.scoreEl) opts.scoreEl.textContent = label;
    if (opts.pctEl) opts.pctEl.textContent = label;
  }

  function updateQuestionCounter(el, current, total, unit) {
    if (!el) return;
    unit = unit || 'Câu';
    if (!total) {
      el.textContent = unit + ' —/—';
      return;
    }
    el.textContent = unit + ' ' + current + '/' + total;
  }

  function autoAdvance(fn, delayMs) {
    autoAdvanceSafe(fn, delayMs);
  }

  function autoAdvanceSafe(fn, delayMs) {
    setTimeout(fn, delayMs == null ? AUTO_DELAY_MS : delayMs);
  }

  function applyGameDataScores(state, data) {
    state = state || {};
    if (data && typeof data.total === 'number' && data.total > 0) {
      state.questionTotal = data.total;
    }
    if (data && typeof data.unitTotal === 'number' && data.unitTotal > 0) {
      state.unitTotal = data.unitTotal;
    }
    if (data && typeof data.maxScore === 'number' && data.maxScore > 0) {
      state.maxScore = data.maxScore;
    }
    return state;
  }

  function applySessionScore(sessionScoreRef, data) {
    if (data && typeof data.sessionScore === 'number') {
      return data.sessionScore;
    }
    return Number(sessionScoreRef) || 0;
  }

  function resolveQuestionTotal(state, fallbackLength) {
    if (state && state.questionTotal > 0) return state.questionTotal;
    return Number(fallbackLength) || 0;
  }

  function resolveMaxScore(state, total) {
    if (state && state.maxScore > 0) return state.maxScore;
    return getMaxScore(total);
  }

  function resolveExerciseMaxScore(state, exercises) {
    if (state && state.maxScore > 0) return state.maxScore;
    if (state && state.unitTotal > 0) return getMaxScore(state.unitTotal);
    return getMaxScore(countExerciseUnits(exercises));
  }

  var LOADING_TEXT = 'đang tải dữ liệu';
  var LOADING_HTML = '<div class="data-loading-state"><i class="fas fa-gear fa-spin" aria-hidden="true"></i> ' + LOADING_TEXT + '</div>';

  function loadingHtml(message) {
    return '<div class="data-loading-state"><i class="fas fa-gear fa-spin" aria-hidden="true"></i> ' +
      (message || LOADING_TEXT) + '</div>';
  }

  function findCheckButton() {
    return document.getElementById('btnCheck') || document.getElementById('btnFinish');
  }

  function showCheckButton() {
    var btn = findCheckButton();
    if (btn) btn.classList.remove('hidden');
  }

  function hideCheckButton() {
    var btn = findCheckButton();
    if (btn) btn.classList.add('hidden');
  }

  function bindCheckEnter(inputEl, handler) {
    if (!inputEl || typeof handler !== 'function') return;
    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        handler();
      }
    });
  }

  return {
    CORRECT_MAX: CORRECT_MAX,
    AUTO_DELAY_MS: AUTO_DELAY_MS,
    LOADING_TEXT: LOADING_TEXT,
    LOADING_HTML: LOADING_HTML,
    loadingHtml: loadingHtml,
    formatNum: formatNum,
    getMaxScore: getMaxScore,
    countExerciseUnits: countExerciseUnits,
    updateScoreBar: updateScoreBar,
    updateQuestionCounter: updateQuestionCounter,
    autoAdvance: autoAdvance,
    autoAdvanceSafe: autoAdvanceSafe,
    applyGameDataScores: applyGameDataScores,
    applySessionScore: applySessionScore,
    resolveQuestionTotal: resolveQuestionTotal,
    resolveMaxScore: resolveMaxScore,
    resolveExerciseMaxScore: resolveExerciseMaxScore,
    findCheckButton: findCheckButton,
    showCheckButton: showCheckButton,
    hideCheckButton: hideCheckButton,
    bindCheckEnter: bindCheckEnter
  };
})();
</script>
