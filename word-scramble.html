  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style type="text/css">
    <?!= include('GameStyles'); ?>

    .scramble-scrambled {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 8px 0 20px;
      min-height: 52px;
    }

    .scramble-letter {
      width: 44px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      border: 2px solid #c5d0e8;
      background: #fff;
      font-size: 22px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: 0;
      box-shadow: 0 2px 6px rgba(13, 43, 110, 0.08);
      user-select: none;
    }

    .scramble-letter.is-used {
      opacity: 0.28;
      transform: scale(0.92);
    }

    .scramble-slot-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 18px;
      min-height: 56px;
    }

    .scramble-slot {
      width: 44px;
      height: 52px;
      border-radius: 12px;
      border: 2px dashed #9eb0d4;
      background: #f4f7fc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: var(--text-dark);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .scramble-slot.is-filled {
      border-style: solid;
      border-color: var(--primary);
      background: #fff;
      cursor: pointer;
    }

    .scramble-slot.is-correct {
      border-color: #2e7d32;
      background: #e8f5e9;
      color: #1b5e20;
      cursor: default;
    }

    .scramble-slot.is-wrong {
      border-color: #c62828;
      background: #ffebee;
      color: #b71c1c;
    }

    .scramble-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .scramble-chip {
      min-width: 44px;
      height: 52px;
      padding: 0 6px;
      border-radius: 12px;
      border: 2px solid var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
      box-shadow: 0 2px 8px rgba(13, 43, 110, 0.12);
    }

    .scramble-chip:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.04);
    }

    .scramble-chip:disabled,
    .scramble-chip.is-used {
      opacity: 0.25;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .scramble-image-wrap {
      text-align: center;
      margin-bottom: 12px;
    }

    .scramble-image-wrap img {
      max-width: 160px;
      max-height: 140px;
      object-fit: contain;
      border-radius: 12px;
    }

    .scramble-display {
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }
  </style>
</head>

  <script type="application/json" id="wewin-url-params"><?!= urlParamsJson ?></script>
  <?!= include('GameCommon'); ?>
  <script>
    var SCRAMBLE_QUESTIONS = [];
    var gameScores = { questionTotal: 0, maxScore: 0 };
    var playOrder = [];
    var GAME_KEY = 'scramble';
    var questionStartTime = 0;
    var sessionScore = 0;

    var playPos = 0;
    var correctCount = 0;
    var answered = false;
    var statuses = [];
    var poolLetters = [];
    var slotLetters = [];

    function readWewinUrlParamsFromDom() {
      var el = document.getElementById('wewin-url-params');
      if (!el || !el.textContent) return {};
      try {
        var parsed = JSON.parse(el.textContent.trim());
        return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
      } catch (ignore) {
        return {};
      }
    }

    function readUrlParam(name) {
      var urlParams = readWewinUrlParamsFromDom();
      var v = String((urlParams && urlParams[name]) || '').trim();
      if (v) return v;
      try {
        v = (new URLSearchParams(window.location.search).get(name) || '').trim();
        if (v) return v;
      } catch (ignore2) { }
      try {
        if (window.top && window.top !== window && window.top.location.search) {
          v = (new URLSearchParams(window.top.location.search).get(name) || '').trim();
        }
      } catch (ignore3) { }
      return v || '';
    }

    var course = readUrlParam('course');
    var level = readUrlParam('level');

    var LOADING_HTML = WewinGameUI.LOADING_HTML;

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i];
        a[i] = a[j];
        a[j] = t;
      }
      return a;
    }

    function rebuildPlayOrder() {
      var idxs = [];
      for (var i = 0; i < SCRAMBLE_QUESTIONS.length; i++) idxs.push(i);
      playOrder = shuffleArray(idxs);
    }

    function currentQuestionIndex() {
      return playOrder[playPos];
    }

    function currentQuestion() {
      return SCRAMBLE_QUESTIONS[currentQuestionIndex()];
    }

    function wordLetters(word) {
      return String(word || '').replace(/\s+/g, '').split('');
    }

    function scrambleLetters(word) {
      var letters = wordLetters(word);
      if (letters.length < 2) return letters;
      var scrambled = shuffleArray(letters);
      var guard = 0;
      while (scrambled.join('') === letters.join('') && guard < 12) {
        scrambled = shuffleArray(letters);
        guard++;
      }
      return scrambled;
    }

    function formatScrambledDots(letters) {
      return letters.map(function (ch) { return String(ch).toUpperCase(); }).join('.');
    }

    function setGameLoading(isLoading) {
      if (isLoading) {
        document.getElementById('questionList').innerHTML = LOADING_HTML;
        document.getElementById('statTotal').textContent = '—';
        document.getElementById('statCorrect').textContent = '—';
        document.getElementById('statWrong').textContent = '—';
        document.getElementById('statPending').textContent = '—';
        document.getElementById('btnStartFirst').disabled = true;
      }
    }

    function showEmptyQuestions(message) {
      document.getElementById('questionList').innerHTML =
        '<div class="data-loading-state">' + (message || (
          'Chưa có từ trong sheet <strong>Questions_Scramble</strong>' +
          (course ? ' cho khóa <strong>' + escapeHtml(course) + '</strong>' : '') +
          (level ? ' (level <strong>' + escapeHtml(level) + '</strong>)' : '') +
          (!course ? ' — <strong>thiếu tham số course</strong> trên URL.' : '') +
          '. Chỉ cần cột <strong>word</strong> (từ đúng); client tự đảo chữ và xáo thứ tự câu.'
        )) + '</div>';
      document.getElementById('btnStartFirst').disabled = true;
    }

    function loadGameData(callback) {
      setGameLoading(true);

      function applyProgress(data) {
        refreshProgressUser(data && data.username);
        var total = getQuestionTotal();
        var local = readLocalStatuses();
        if (data && data.loggedIn && data.statuses) {
          statuses = local
            ? mergeStatuses(data.statuses, local, total)
            : data.statuses.slice();
          saveProgressLocal();
          if (local && countDoneStatuses(statuses) > countDoneStatuses(data.statuses)) {
            google.script.run.saveGameProgress(course, GAME_KEY, statuses, false, level);
          }
        } else {
          loadProgressLocal();
        }
      }

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (data) {
            var list = data && data.questions ? data.questions : [];
            SCRAMBLE_QUESTIONS = list;
            WewinGameUI.applyGameDataScores(gameScores, data);
            sessionScore = WewinGameUI.applySessionScore(sessionScore, data);
            rebuildPlayOrder();
            if (!SCRAMBLE_QUESTIONS.length) showEmptyQuestions();
            applyProgress(data);
            if (callback) callback();
          })
          .withFailureHandler(function (err) {
            SCRAMBLE_QUESTIONS = [];
            gameScores = { questionTotal: 0, maxScore: 0 };
            playOrder = [];
            showEmptyQuestions('Không tải được dữ liệu: ' + (err && err.message ? err.message : 'lỗi kết nối Apps Script'));
            if (callback) callback();
          })
          .getScrambleGameData(course, level);
      } else {
        /* Preview local */
        SCRAMBLE_QUESTIONS = [
          { id: 1, word: 'PENCIL', hint: 'Đồ dùng học tập', image: '' },
          { id: 2, word: 'APPLE', hint: 'Quả táo', image: '' },
          { id: 3, word: 'TABLE', hint: 'Cái bàn', image: '' }
        ];
        gameScores.questionTotal = SCRAMBLE_QUESTIONS.length;
        gameScores.maxScore = WewinGameUI.getMaxScore(SCRAMBLE_QUESTIONS.length);
        rebuildPlayOrder();
        loadProgressLocal();
        if (callback) callback();
      }
    }

    var progressUser = 'guest';

    function refreshProgressUser(serverUsername) {
      if (serverUsername) {
        progressUser = serverUsername;
        return;
      }
      try {
        var cached = sessionStorage.getItem('wewinUser');
        if (cached) {
          var u = JSON.parse(cached);
          if (u && u.username) {
            progressUser = u.username;
            return;
          }
        }
      } catch (err) { /* ignore */ }
      progressUser = 'guest';
    }

    function getProgressKey() {
      return 'wewin_progress_' + GAME_KEY + '_' + course +
        (level ? '__' + level : '') + '_' + progressUser;
    }

    function getQuestionTotal() {
      return WewinGameUI.resolveQuestionTotal(gameScores, SCRAMBLE_QUESTIONS.length);
    }

    function pickStatus(a, b) {
      if (a === 'correct' || b === 'correct') return 'correct';
      if (a === 'wrong' || b === 'wrong') return 'wrong';
      return null;
    }

    function mergeStatuses(existing, incoming, total) {
      total = total || Math.max(
        (existing && existing.length) || 0,
        (incoming && incoming.length) || 0
      );
      var merged = new Array(total);
      for (var i = 0; i < total; i++) {
        var e = existing && i < existing.length ? existing[i] : null;
        var n = incoming && i < incoming.length ? incoming[i] : null;
        merged[i] = pickStatus(e, n);
      }
      return merged;
    }

    function readLocalStatuses() {
      try {
        var saved = JSON.parse(localStorage.getItem(getProgressKey()));
        if (saved && saved.statuses && saved.statuses.length) return saved.statuses;
      } catch (err) { /* ignore */ }
      return null;
    }

    function loadProgressLocal() {
      var local = readLocalStatuses();
      var total = getQuestionTotal();
      if (local) {
        statuses = mergeStatuses(local, new Array(total).fill(null), total);
        return;
      }
      statuses = new Array(total).fill(null);
    }

    function saveProgressLocal() {
      localStorage.setItem(getProgressKey(), JSON.stringify({ statuses: statuses }));
    }

    function countDoneStatuses(list) {
      return list.filter(function (s) { return s === 'correct' || s === 'wrong'; }).length;
    }

    function saveProgress(reset) {
      saveProgressLocal();
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (data) {
            if (data && data.statuses) {
              statuses = data.statuses;
              saveProgressLocal();
            }
          })
          .saveGameProgress(course, GAME_KEY, statuses, !!reset, level);
      }
    }

    function formatPoints(n) {
      var sign = n >= 0 ? '+' : '';
      return sign + Number(n).toLocaleString('vi-VN') + ' điểm';
    }

    function getMaxScore() {
      return WewinGameUI.resolveMaxScore(gameScores, getQuestionTotal());
    }

    function refreshScoreBar() {
      WewinGameUI.updateScoreBar({
        sessionScore: sessionScore,
        maxScore: getMaxScore(),
        fillEl: document.getElementById('progressFill'),
        scoreEl: document.getElementById('metaScore')
      });
    }

    function advanceAfterAnswer() {
      WewinGameUI.autoAdvanceSafe(function () {
        if (playPos < getQuestionTotal() - 1) {
          playPos++;
          renderQuestion();
        } else {
          showResult();
        }
      });
    }

    function slotsFull() {
      return slotLetters.length > 0 && slotLetters.every(function (s) { return !!s; });
    }

    function maybeAutoCheck() {
      if (!answered && slotsFull()) finishAnswer();
    }

    function submitScore(isCorrect) {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        refreshScoreBar();
        return;
      }
      var elapsed = Date.now() - questionStartTime;
      google.script.run
        .withSuccessHandler(function (data) {
          if (data && data.success && typeof data.points === 'number') {
            sessionScore += data.points;
            var fb = document.getElementById('feedback');
            var scoreLine = '<div class="score-line">' + formatPoints(data.points) + '</div>';
            fb.innerHTML = fb.innerHTML + scoreLine;
          }
          refreshScoreBar();
        })
        .submitAnswerScore(course, GAME_KEY, currentQuestionIndex(), isCorrect, elapsed);
    }

    function countStats() {
      var correct = 0;
      var wrong = 0;
      var pending = 0;
      statuses.forEach(function (s) {
        if (s === 'correct') correct++;
        else if (s === 'wrong') wrong++;
        else pending++;
      });
      return { correct: correct, wrong: wrong, pending: pending };
    }

    function renderList() {
      document.getElementById('listPanel').classList.remove('hidden');
      document.getElementById('questionPanel').classList.add('hidden');
      document.getElementById('resultPanel').classList.add('hidden');
      document.getElementById('game-meta').classList.add('hidden');

      var stats = countStats();
      document.getElementById('statTotal').textContent = getQuestionTotal();
      document.getElementById('statCorrect').textContent = stats.correct;
      document.getElementById('statWrong').textContent = stats.wrong;
      document.getElementById('statPending').textContent = stats.pending;

      var html = '';
      playOrder.forEach(function (qIndex, listPos) {
        var q = SCRAMBLE_QUESTIONS[qIndex];
        var st = statuses[qIndex] || 'pending';
        var statusClass = st === 'correct' ? 'status-correct' : st === 'wrong' ? 'status-wrong' : 'status-pending';
        var icon = st === 'correct' ? '<i class="fas fa-check"></i>' :
          st === 'wrong' ? '<i class="fas fa-times"></i>' : '<i class="far fa-circle"></i>';
        var label = st === 'correct' || st === 'wrong'
          ? String(q.word).toUpperCase()
          : 'Từ ' + (listPos + 1);
        html += '<div class="q-list-item ' + statusClass + '" data-pos="' + listPos + '">' +
          '<span class="q-num">' + (listPos + 1) + '</span>' +
          '<span class="q-preview">' + escapeHtml(label) + '</span>' +
          '<span class="q-status">' + icon + '</span></div>';
      });
      document.getElementById('questionList').innerHTML = html;

      document.querySelectorAll('.q-list-item').forEach(function (item) {
        item.addEventListener('click', function () {
          openPlayPos(parseInt(this.getAttribute('data-pos'), 10));
        });
      });

      var firstPendingPos = -1;
      for (var p = 0; p < playOrder.length; p++) {
        if (statuses[playOrder[p]] == null) {
          firstPendingPos = p;
          break;
        }
      }
      document.getElementById('btnStartFirst').textContent =
        firstPendingPos >= 0 ? 'Bắt đầu làm bài' : 'Làm lại từ đầu';
      document.getElementById('btnStartFirst').disabled = !getQuestionTotal();
    }

    function openPlayPos(pos) {
      playPos = pos;
      correctCount = statuses.filter(function (s) { return s === 'correct'; }).length;
      document.getElementById('listPanel').classList.add('hidden');
      document.getElementById('questionPanel').classList.remove('hidden');
      document.getElementById('game-meta').classList.remove('hidden');
      renderQuestion();
    }

    function backToList() {
      renderList();
    }

    function normalizeWord(str) {
      return String(str || '').trim().toLowerCase().replace(/\s+/g, '');
    }

    function updateMeta() {
      document.getElementById('metaCourse').textContent = course || 'Khóa học';
      WewinGameUI.updateQuestionCounter(
        document.getElementById('metaProgress'),
        playPos + 1,
        getQuestionTotal(),
        'Từ'
      );
      refreshScoreBar();
      if (course) {
        document.getElementById('gameSubtitle').textContent =
          course + (level ? ' · ' + level : '');
      }
    }

    function buildBoard(reshuffle) {
      var q = currentQuestion();
      var letters = reshuffle || !poolLetters.length
        ? scrambleLetters(q.word)
        : poolLetters.map(function (item) { return item.ch; });

      poolLetters = letters.map(function (ch, i) {
        return { id: i, ch: ch, used: false };
      });
      slotLetters = wordLetters(q.word).map(function () { return null; });

      document.getElementById('scrambledDisplay').textContent = formatScrambledDots(letters);

      var hint = String(q.hint || '').trim();
      var hintBox = document.getElementById('hintBox');
      if (hint) {
        hintBox.classList.remove('hidden');
        document.getElementById('hintText').textContent = hint;
      } else {
        hintBox.classList.add('hidden');
        document.getElementById('hintText').textContent = '';
      }

      var imageWrap = document.getElementById('imageWrap');
      var img = document.getElementById('questionImage');
      if (q.image) {
        imageWrap.classList.remove('hidden');
        img.src = q.image;
        img.alt = q.word;
      } else {
        imageWrap.classList.add('hidden');
        img.removeAttribute('src');
      }

      renderSlots();
      renderPool();
    }

    function renderSlots() {
      var row = document.getElementById('slotRow');
      var html = '';
      slotLetters.forEach(function (item, i) {
        var cls = 'scramble-slot' + (item ? ' is-filled' : '');
        html += '<button type="button" class="' + cls + '" data-slot="' + i + '"' +
          (answered ? ' disabled' : '') + '>' +
          (item ? escapeHtml(String(item.ch).toUpperCase()) : '') +
          '</button>';
      });
      row.innerHTML = html;
      row.querySelectorAll('.scramble-slot').forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (answered) return;
          removeFromSlot(parseInt(this.getAttribute('data-slot'), 10));
        });
      });
    }

    function renderPool() {
      var pool = document.getElementById('letterPool');
      var html = '';
      poolLetters.forEach(function (item) {
        html += '<button type="button" class="scramble-chip' + (item.used ? ' is-used' : '') +
          '" data-id="' + item.id + '"' + (item.used || answered ? ' disabled' : '') + '>' +
          escapeHtml(String(item.ch).toUpperCase()) +
          '</button>';
      });
      pool.innerHTML = html;
      pool.querySelectorAll('.scramble-chip').forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (answered || this.disabled) return;
          placeLetter(parseInt(this.getAttribute('data-id'), 10));
        });
      });
    }

    function placeLetter(letterId) {
      var letter = null;
      for (var i = 0; i < poolLetters.length; i++) {
        if (poolLetters[i].id === letterId && !poolLetters[i].used) {
          letter = poolLetters[i];
          break;
        }
      }
      if (!letter) return;

      var emptyIdx = -1;
      for (var s = 0; s < slotLetters.length; s++) {
        if (!slotLetters[s]) {
          emptyIdx = s;
          break;
        }
      }
      if (emptyIdx < 0) return;

      letter.used = true;
      slotLetters[emptyIdx] = { id: letter.id, ch: letter.ch };
      renderSlots();
      renderPool();
      maybeAutoCheck();
    }

    function findAvailableLetterIdByChar(ch) {
      var target = String(ch || '').toUpperCase();
      for (var i = 0; i < poolLetters.length; i++) {
        if (!poolLetters[i].used && String(poolLetters[i].ch).toUpperCase() === target) {
          return poolLetters[i].id;
        }
      }
      return -1;
    }

    function placeLetterByChar(ch) {
      var letterId = findAvailableLetterIdByChar(ch);
      if (letterId < 0) return false;
      placeLetter(letterId);
      return true;
    }

    function removeFromSlot(slotIdx) {
      var item = slotLetters[slotIdx];
      if (!item) return;
      for (var i = 0; i < poolLetters.length; i++) {
        if (poolLetters[i].id === item.id) {
          poolLetters[i].used = false;
          break;
        }
      }
      slotLetters[slotIdx] = null;
      renderSlots();
      renderPool();
    }

    function removeLastFilledSlot() {
      for (var i = slotLetters.length - 1; i >= 0; i--) {
        if (slotLetters[i]) {
          removeFromSlot(i);
          return true;
        }
      }
      return false;
    }

    function clearBoard() {
      if (answered) return;
      poolLetters.forEach(function (item) { item.used = false; });
      slotLetters = slotLetters.map(function () { return null; });
      renderSlots();
      renderPool();
    }

    function getUserAnswer() {
      return slotLetters.map(function (item) {
        return item ? item.ch : '';
      }).join('');
    }

    function renderQuestion() {
      answered = false;
      questionStartTime = Date.now();
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('feedback').innerHTML = '';
      document.getElementById('btnClear').classList.remove('hidden');
      document.getElementById('btnNext').classList.add('hidden');
      document.getElementById('btnToList').classList.add('hidden');
      WewinGameUI.showCheckButton();
      poolLetters = [];
      buildBoard(true);
      updateMeta();
    }

    function markSlotsResult(isCorrect) {
      var row = document.getElementById('slotRow');
      row.querySelectorAll('.scramble-slot').forEach(function (btn) {
        btn.classList.add(isCorrect ? 'is-correct' : 'is-wrong');
        btn.disabled = true;
      });
      document.getElementById('letterPool').querySelectorAll('.scramble-chip').forEach(function (btn) {
        btn.disabled = true;
      });
    }

    function showResult() {
      document.getElementById('questionPanel').classList.add('hidden');
      document.getElementById('game-meta').classList.add('hidden');
      document.getElementById('resultPanel').classList.remove('hidden');
      correctCount = statuses.filter(function (s) { return s === 'correct'; }).length;
      document.getElementById('resultText').textContent =
        'Bạn đã trả lời đúng ' + correctCount + '/' + getQuestionTotal() + ' từ.' +
        (sessionScore ? ' Tổng điểm phiên: ' + formatPoints(sessionScore) + '.' : '');
      refreshScoreBar();
    }

    function goBack() {
      saveProgressLocal();
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.saveGameProgress(course, GAME_KEY, statuses, false, level);
        google.script.run.withSuccessHandler(function (url) {
          window.top.location.href = url;
        }).getAppUrl();
      } else {
        window.location.href = 'index.html';
      }
    }

    function finishAnswer() {
      if (answered) return;
      var q = currentQuestion();
      var qIndex = currentQuestionIndex();
      var userAnswer = getUserAnswer();
      if (normalizeWord(userAnswer).length < normalizeWord(q.word).length) {
        return;
      }

      var isCorrect = normalizeWord(userAnswer) === normalizeWord(q.word);
      var prevStatus = statuses[qIndex];
      var feedback = document.getElementById('feedback');

      answered = true;
      WewinGameUI.hideCheckButton();
      feedback.classList.add('show');
      markSlotsResult(isCorrect);

      if (isCorrect) {
        statuses[qIndex] = 'correct';
        feedback.classList.add('correct');
        feedback.innerHTML = '<i class="fas fa-check-circle"></i> Chính xác! <strong>' +
          escapeHtml(String(q.word).toUpperCase()) + '</strong>';
      } else {
        statuses[qIndex] = 'wrong';
        feedback.classList.add('wrong');
        feedback.innerHTML = '<i class="fas fa-times-circle"></i> Chưa đúng. Đáp án: <strong>' +
          escapeHtml(String(q.word).toUpperCase()) + '</strong>';
      }

      if (prevStatus === null) {
        submitScore(isCorrect);
      } else {
        refreshScoreBar();
      }

      saveProgress();
      correctCount = statuses.filter(function (s) { return s === 'correct'; }).length;
      document.getElementById('btnClear').classList.add('hidden');
      advanceAfterAnswer();
    }

    document.getElementById('btnCheck').addEventListener('click', finishAnswer);

    document.getElementById('btnClear').addEventListener('click', clearBoard);
    document.getElementById('btnToList').addEventListener('click', backToList);

    document.getElementById('btnStartFirst').addEventListener('click', function () {
      var firstPendingPos = -1;
      for (var p = 0; p < playOrder.length; p++) {
        if (statuses[playOrder[p]] == null) {
          firstPendingPos = p;
          break;
        }
      }
      if (firstPendingPos >= 0) openPlayPos(firstPendingPos);
      else openPlayPos(0);
    });

    document.getElementById('btnNext').addEventListener('click', function () {
      if (playPos < getQuestionTotal() - 1) {
        playPos++;
        renderQuestion();
      } else {
        showResult();
      }
    });

    document.getElementById('btnRetry').addEventListener('click', function () {
      rebuildPlayOrder();
      statuses = new Array(getQuestionTotal()).fill(null);
      sessionScore = 0;
      gameScores.maxScore = WewinGameUI.getMaxScore(getQuestionTotal());
      saveProgress(true);
      playPos = 0;
      correctCount = 0;
      document.getElementById('resultPanel').classList.add('hidden');
      renderList();
    });

    document.getElementById('btnBack').addEventListener('click', goBack);
    document.getElementById('btnBackResult').addEventListener('click', goBack);

    document.addEventListener('keydown', function (e) {
      var questionPanel = document.getElementById('questionPanel');
      if (!questionPanel || questionPanel.classList.contains('hidden') || answered) return;

      var key = String(e.key || '');
      if (key === 'Enter') {
        e.preventDefault();
        finishAnswer();
        return;
      }

      if (key === 'Backspace' || key === 'Delete') {
        e.preventDefault();
        removeLastFilledSlot();
        return;
      }

      if (key.length === 1 && /^[a-zA-Z]$/.test(key)) {
        if (placeLetterByChar(key)) {
          e.preventDefault();
          maybeAutoCheck();
        }
      }
    });

    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run.withSuccessHandler(function (boot) {
        if (boot && boot.appUrl) document.getElementById('navHome').href = boot.appUrl;
        if (boot && boot.logoSrc) document.getElementById('sidebarLogo').src = boot.logoSrc;
      }).getPageBootstrap();
    } else {
      document.getElementById('navHome').href = 'index.html';
    }

    if (course) {
      document.getElementById('gameSubtitle').textContent =
        course + (level ? ' · ' + level : '');
    }

    (function initMobileNav() {
      var app = document.getElementById('appShell');
      var btn = document.getElementById('btnMobileMenu');
      var backdrop = document.getElementById('sidebarBackdrop');
      if (!app || !btn) return;

      function closeSidebar() {
        app.classList.remove('sidebar-open');
        if (backdrop) backdrop.classList.add('hidden');
      }

      function openSidebar() {
        app.classList.add('sidebar-open');
        if (backdrop) backdrop.classList.remove('hidden');
      }

      btn.addEventListener('click', function () {
        if (app.classList.contains('sidebar-open')) closeSidebar();
        else openSidebar();
      });

      if (backdrop) backdrop.addEventListener('click', closeSidebar);

      window.addEventListener('resize', function () {
        if (window.innerWidth > 900) closeSidebar();
      });
    })();

    loadGameData(renderList);
  </script>
</body>

</html>
