<head>

  <style type="text/css">
    <?!= include('GameStyles'); ?>

    .wm-board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 8px;
    }

    .wm-col-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .wm-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .wm-item {
      border: 2px solid #d7e0f2;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s, opacity 0.12s;
    }

    .wm-item:hover:not(.is-done) {
      transform: translateY(-1px);
      border-color: var(--primary);
    }

    .wm-item.is-selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(13, 43, 110, 0.16);
      background: var(--primary-light);
    }

    .wm-item.is-done {
      border-color: #2e7d32;
      background: #e8f5e9;
      cursor: default;
      opacity: 0.75;
    }

    .wm-word-btn {
      width: 100%;
      border: none;
      background: transparent;
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      color: var(--text-dark);
      padding: 16px 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: inherit;
    }

    .wm-img-btn {
      width: 100%;
      border: none;
      background: transparent;
      cursor: inherit;
      padding: 8px;
      border-radius: 10px;
    }

    .wm-img {
      width: 100%;
      height: 92px;
      object-fit: contain;
      border-radius: 10px;
      background: #f8fafc;
    }

    .wm-img-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 92px;
      border-radius: 10px;
      background: #f1f5f9;
      color: #94a3b8;
      font-size: 28px;
      font-weight: 800;
    }

    .wm-hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 700;
      min-height: 18px;
    }

    .wm-progress-line {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 800;
      color: var(--primary);
    }

    @media (max-width: 900px) {
      .wm-board {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page-shell">
    <div class="app" id="appShell">
      <div class="sidebar-backdrop hidden" id="sidebarBackdrop"></div>
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img id="sidebarLogo" src="wewinlogo.png" alt="WeWIN">
        </div>
        <nav class="sidebar-nav">
          <a class="nav-item" href="#" id="navHome"><i class="fas fa-home"></i> Trang chủ</a>
          <a class="nav-item active" href="#"><i class="fas fa-image"></i> Nối từ với hình</a>
        </nav>
        <div class="sidebar-version">Version: 2.3.219</div>
      </aside>

      <main class="main">
        <div class="game-page">
          <div class="game-top">
            <button type="button" class="mobile-menu-btn" id="btnMobileMenu" aria-label="Mở menu"><i class="fas fa-bars"></i></button>
            <button type="button" class="game-back" id="btnBack" title="Quay lại"><i class="fas fa-arrow-left"></i></button>
            <div class="game-title-wrap">
              <h1>Nối từ với hình ảnh</h1>

          <div class="game-meta" id="game-meta">

            <span class="question-counter-pill" id="metaProgress">Cặp —/—</span>

            <div class="wm-hint" id="gameHint"></div>
            <div class="wm-board">
              <div>
                <div class="wm-col-title">Từ vựng</div>
                <div class="wm-list" id="wordList"></div>
              </div>
              <div>
                <div class="wm-col-title">Hình ảnh</div>

  <script type="application/json" id="wewin-url-params"><?!= urlParamsJson ?></script>
  <?!= include('GameCommon'); ?>
  <script>
    var GAME_KEY = 'word_match';
    var WORD_MATCH_QUESTIONS = [];
    var gameScores = { questionTotal: 0, maxScore: 0 };
    var statuses = [];
    var selectedWordIndex = -1;
    var selectedImageIndex = -1;
    var wordOrder = [];
    var imageOrder = [];
    var questionStartTime = 0;
    var sessionScore = 0;

    function readWewinUrlParamsFromDom() {
      var el = document.getElementById('wewin-url-params');
      if (!el || !el.textContent) return {};
      try {
        var parsed = JSON.parse(el.textContent.trim());
        return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
      } catch (ignore) {
        return {};
      }
    }

    function readUrlParam(name) {
      var urlParams = readWewinUrlParamsFromDom();
      var v = String((urlParams && urlParams[name]) || '').trim();
      if (v) return v;
      try {
        v = (new URLSearchParams(window.location.search).get(name) || '').trim();
        if (v) return v;
      } catch (ignore2) { }
      return v || '';
    }

    var course = readUrlParam('course');
    var level = readUrlParam('level');
    var progressUser = 'guest';

    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i];
        a[i] = a[j];
        a[j] = t;
      }
      return a;
    }

    function refreshProgressUser(serverUsername) {
      if (serverUsername) {
        progressUser = serverUsername;
        return;
      }
      try {
        var cached = sessionStorage.getItem('wewinUser');
        if (cached) {
          var u = JSON.parse(cached);
          if (u && u.username) progressUser = u.username;
        }
      } catch (err) { }
    }

    function getProgressKey() {
      return 'wewin_progress_' + GAME_KEY + '_' + course + (level ? '__' + level : '') + '_' + progressUser;
    }

    function pickStatus(a, b) {
      if (a === 'correct' || b === 'correct') return 'correct';
      if (a === 'wrong' || b === 'wrong') return 'wrong';
      return null;
    }

    function mergeStatuses(existing, incoming, total) {
      total = total || Math.max((existing && existing.length) || 0, (incoming && incoming.length) || 0);
      var merged = new Array(total);
      for (var i = 0; i < total; i++) {
        var e = existing && i < existing.length ? existing[i] : null;
        var n = incoming && i < incoming.length ? incoming[i] : null;
        merged[i] = pickStatus(e, n);
      }
      return merged;
    }

    function readLocalStatuses() {
      try {
        var saved = JSON.parse(localStorage.getItem(getProgressKey()));
        if (saved && Array.isArray(saved.statuses)) return saved.statuses;
      } catch (err) { }
      return null;
    }

    function saveProgressLocal() {
      localStorage.setItem(getProgressKey(), JSON.stringify({ statuses: statuses }));
    }

    function saveProgress(reset) {
      saveProgressLocal();
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (data) {
            if (data && data.statuses) {
              statuses = data.statuses;
              saveProgressLocal();
            }
          })
          .saveGameProgress(course, GAME_KEY, statuses, !!reset, level);
      }
    }

    function doneCount() {
      var c = 0;
      for (var i = 0; i < statuses.length; i++) {
        if (statuses[i] === 'correct') c++;
      }
      return c;
    }

    function getQuestionTotal() {
      return WewinGameUI.resolveQuestionTotal(gameScores, WORD_MATCH_QUESTIONS.length);
    }

    function getMaxScore() {
      return WewinGameUI.resolveMaxScore(gameScores, getQuestionTotal());
    }

    function refreshScoreBar() {
      WewinGameUI.updateScoreBar({
        sessionScore: sessionScore,
        maxScore: getMaxScore(),
        fillEl: document.getElementById('progressFill'),
        scoreEl: document.getElementById('metaScore')
      });
    }

    function updateMeta() {
      var done = doneCount();
      var total = getQuestionTotal();
      document.getElementById('metaCourse').textContent = course || 'Khóa học';
      WewinGameUI.updateQuestionCounter(
        document.getElementById('metaProgress'),
        done,
        total,
        'Cặp'
      );
      document.getElementById('pairProgress').textContent = total
        ? ('Đúng ' + done + '/' + total + ' cặp')
        : 'Đúng —/— cặp';
      refreshScoreBar();
      if (course) {
        document.getElementById('gameSubtitle').textContent = course + (level ? ' · ' + level : '');
      }
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function isDone(idx) {
      return statuses[idx] === 'correct';
    }

    function renderBoard() {
      var wordHtml = '';
      for (var i = 0; i < wordOrder.length; i++) {
        var idx = wordOrder[i];
        var q = WORD_MATCH_QUESTIONS[idx];
        var cls = 'wm-item';
        if (selectedWordIndex === idx) cls += ' is-selected';
        if (isDone(idx)) cls += ' is-done';
        wordHtml += '<div class="' + cls + '" data-word="' + idx + '"><button type="button" class="wm-word-btn">' +
          escapeHtml(String(q.word).toUpperCase()) + '</button></div>';
      }
      document.getElementById('wordList').innerHTML = wordHtml;

      var imageHtml = '';
      for (var j = 0; j < imageOrder.length; j++) {
        var idy = imageOrder[j];
        var qi = WORD_MATCH_QUESTIONS[idy];
        var clsi = 'wm-item';
        if (selectedImageIndex === idy) clsi += ' is-selected';
        if (isDone(idy)) clsi += ' is-done';
        var imgSrc = qi.image ? escapeHtml(qi.image) : '';
        var imgTag = imgSrc
          ? '<img class="wm-img" src="' + imgSrc + '" alt="' + escapeHtml(qi.word) + '" onerror="this.replaceWith(Object.assign(document.createElement(\'span\'),{className:\'wm-img-placeholder\',textContent:\'?\'}))">'
          : '<span class="wm-img-placeholder">?</span>';
        imageHtml += '<div class="' + clsi + '" data-image="' + idy + '"><button type="button" class="wm-img-btn">' +
          imgTag + '</button></div>';
      }
      document.getElementById('imageList').innerHTML = imageHtml;

      bindBoardClicks();
      WewinGameUI.showCheckButton();
      updateMeta();
    }

    function formatPoints(n) {
      var sign = n >= 0 ? '+' : '';
      return sign + Number(n).toLocaleString('vi-VN') + ' điểm';
    }

    function submitScore(questionIndex, isCorrect) {
      if (typeof google === 'undefined' || !google.script || !google.script.run) return;
      var elapsed = Date.now() - questionStartTime;
      google.script.run.withSuccessHandler(function (data) {
        if (data && data.success && typeof data.points === 'number') {
          sessionScore += data.points;
          var fb = document.getElementById('feedback');
          fb.innerHTML += '<div class="score-line">' + formatPoints(data.points) + '</div>';
          refreshScoreBar();
        }
      }).submitAnswerScore(course, GAME_KEY, questionIndex, isCorrect, elapsed);
    }

    function showFeedback(ok, message) {
      var fb = document.getElementById('feedback');
      fb.className = 'feedback show ' + (ok ? 'correct' : 'wrong');
      fb.innerHTML = (ok
        ? '<i class="fas fa-check-circle"></i> '
        : '<i class="fas fa-times-circle"></i> ') + message;
    }

    function clearSelection() {
      selectedWordIndex = -1;
      selectedImageIndex = -1;
      document.getElementById('gameHint').textContent = '';
      renderBoard();
    }

    function checkMatch() {
      if (selectedWordIndex < 0 || selectedImageIndex < 0) return;
      var isCorrect = selectedWordIndex === selectedImageIndex;
      submitScore(selectedWordIndex, isCorrect);

      if (isCorrect) {
        statuses[selectedWordIndex] = 'correct';
        saveProgress(false);
        var hint = WORD_MATCH_QUESTIONS[selectedWordIndex].hint;
        showFeedback(true, 'Đúng rồi! ' + (hint ? '<strong>' + escapeHtml(hint) + '</strong>' : ''));
      } else {
        showFeedback(false, 'Chưa khớp. Thử cặp khác nhé.');
      }

      clearSelection();
      maybeFinish();
    }

    function maybeFinish() {
      var done = doneCount();
      if (done !== WORD_MATCH_QUESTIONS.length || !WORD_MATCH_QUESTIONS.length) return;
      document.getElementById('playPanel').classList.add('hidden');
      document.getElementById('resultPanel').classList.remove('hidden');
      document.getElementById('resultText').textContent =
        'Bạn đã nối đúng ' + done + '/' + WORD_MATCH_QUESTIONS.length + ' cặp.' +
        (sessionScore ? ' Tổng điểm phiên: ' + formatPoints(sessionScore) + '.' : '');
      refreshScoreBar();
    }

    function bindBoardClicks() {
      var wordList = document.getElementById('wordList');
      var imageList = document.getElementById('imageList');
      wordList.querySelectorAll('[data-word]').forEach(function (el) {
        el.addEventListener('click', function () {
          var idx = Number(this.getAttribute('data-word'));
          if (isDone(idx)) return;
          selectedWordIndex = idx;
          var hint = WORD_MATCH_QUESTIONS[idx] && WORD_MATCH_QUESTIONS[idx].hint
            ? WORD_MATCH_QUESTIONS[idx].hint
            : '';
          document.getElementById('gameHint').textContent = hint || '';
          renderBoard();
          checkMatch();
        });
      });
      imageList.querySelectorAll('[data-image]').forEach(function (el) {
        el.addEventListener('click', function () {
          var idx = Number(this.getAttribute('data-image'));
          if (isDone(idx)) return;
          selectedImageIndex = idx;
          renderBoard();
          checkMatch();
        });
      });
    }

    function rebuildOrders() {
      var idxs = [];
      for (var i = 0; i < WORD_MATCH_QUESTIONS.length; i++) idxs.push(i);
      wordOrder = shuffleArray(idxs);
      imageOrder = shuffleArray(idxs);
    }

    function showEmpty(message) {
      var panel = document.getElementById('playPanel');
      panel.innerHTML = '<div class="data-loading-state">' + (message || 'Chưa có dữ liệu game nối từ với hình') + '</div>';
    }

    function showLoading() {
      document.getElementById('playPanel').innerHTML = WewinGameUI.LOADING_HTML;
    }

    function loadGameData() {
      showLoading();
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (data) {
            WORD_MATCH_QUESTIONS = data && data.questions ? data.questions : [];
            if (!WORD_MATCH_QUESTIONS.length) {
              showEmpty('Chưa có dữ liệu trong sheet <strong>Questions_WordMatch</strong>.');
              return;
            }

            WewinGameUI.applyGameDataScores(gameScores, data);
            sessionScore = WewinGameUI.applySessionScore(sessionScore, data);

            refreshProgressUser(data && data.username);
            var local = readLocalStatuses();
            statuses = data && data.statuses ? data.statuses.slice() : new Array(WORD_MATCH_QUESTIONS.length).fill(null);
            if (local) statuses = mergeStatuses(statuses, local, WORD_MATCH_QUESTIONS.length);
            while (statuses.length < WORD_MATCH_QUESTIONS.length) statuses.push(null);
            saveProgressLocal();
            rebuildOrders();
            questionStartTime = Date.now();
            renderBoard();
            maybeFinish();
          })
          .withFailureHandler(function (err) {
            showEmpty('Không tải được dữ liệu: ' + ((err && err.message) || 'lỗi kết nối'));
          })
          .getWordMatchGameData(course, level);
      } else {
        WORD_MATCH_QUESTIONS = [];
        showEmpty('Vui lòng chạy qua Google Apps Script Web App.');
      }
    }

    function resetGame() {
      statuses = new Array(WORD_MATCH_QUESTIONS.length).fill(null);
      selectedWordIndex = -1;
      selectedImageIndex = -1;
      sessionScore = 0;
      gameScores.maxScore = WewinGameUI.getMaxScore(getQuestionTotal());
      questionStartTime = Date.now();
      saveProgress(true);
      rebuildOrders();
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('feedback').innerHTML = '';
      document.getElementById('resultPanel').classList.add('hidden');
      document.getElementById('playPanel').classList.remove('hidden');
      renderBoard();
    }

    function goBack() {
      saveProgressLocal();
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.saveGameProgress(course, GAME_KEY, statuses, false, level);
        google.script.run.withSuccessHandler(function (url) {
          window.top.location.href = url;
        }).getAppUrl();
      } else {
        window.location.href = 'index.html';
      }
    }

    document.getElementById('btnCheck').addEventListener('click', function () {
      if (selectedWordIndex < 0 || selectedImageIndex < 0) {
        showFeedback(false, 'Hãy chọn một từ và một hình trước khi kiểm tra.');
        return;
      }
      checkMatch();
    });
    document.getElementById('btnClear').addEventListener('click', clearSelection);
    document.getElementById('btnRetry').addEventListener('click', resetGame);
    document.getElementById('btnRetryDone').addEventListener('click', resetGame);
    document.getElementById('btnBack').addEventListener('click', goBack);
    document.getElementById('btnBackResult').addEventListener('click', goBack);
    document.getElementById('btnExitDone').addEventListener('click', goBack);

    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run.withSuccessHandler(function (boot) {
        if (boot && boot.appUrl) document.getElementById('navHome').href = boot.appUrl;
        if (boot && boot.logoSrc) document.getElementById('sidebarLogo').src = boot.logoSrc;
      }).getPageBootstrap();
    } else {
      document.getElementById('navHome').href = 'index.html';
    }

    (function initMobileNav() {
      var app = document.getElementById('appShell');
      var btn = document.getElementById('btnMobileMenu');
      var backdrop = document.getElementById('sidebarBackdrop');
      if (!app || !btn) return;

      function closeSidebar() {
        app.classList.remove('sidebar-open');
        if (backdrop) backdrop.classList.add('hidden');
      }
      function openSidebar() {
        app.classList.add('sidebar-open');
        if (backdrop) backdrop.classList.remove('hidden');
      }

      btn.addEventListener('click', function () {
        if (app.classList.contains('sidebar-open')) closeSidebar();
        else openSidebar();
      });
      if (backdrop) backdrop.addEventListener('click', closeSidebar);
      window.addEventListener('resize', function () {
        if (window.innerWidth > 900) closeSidebar();
      });
    })();

    loadGameData();
  </script>
</body>
