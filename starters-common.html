<script>
/**
 * Tiện ích dùng chung cho 6 game Starters.
 * File này đã có thẻ <script> — include bằng <?!= include('starters-common'); ?> (KHÔNG bọc thêm <script>).
 */
var WewinStarters = (function () {
  var GAS_HANDLERS = {
    look_and_write: 'getLookAndWriteGameData',
    choose_and_circle: 'getChooseAndCircleGameData',
    read_and_complete: 'getReadAndCompleteGameData',
    read_and_match: 'getReadAndMatchGameData',
    vocabulary_test: 'getVocabularyTestGameData',
    vocabulary_check: 'getVocabularyCheckGameData'
  };

  function readWewinUrlParamsFromDom() {
    var el = document.getElementById('wewin-url-params');
    if (!el || !el.textContent) return {};
    try {
      var parsed = JSON.parse(el.textContent.trim());
      return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
    } catch (ignore) {
      return {};
    }
  }

  function readUrlCourseParam() {
    var urlParams = readWewinUrlParamsFromDom();
    var c = String((urlParams && urlParams.course) || '').trim();
    if (c) return c;
    try {
      c = (new URLSearchParams(window.location.search).get('course') || '').trim();
      if (c) return c;
    } catch (ignore2) { }
    return c || '';
  }

  function escapeHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function shuffleArray(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i];
      a[i] = a[j];
      a[j] = t;
    }
    return a;
  }

  function normalizeWord(w) {
    return String(w || '').trim().toLowerCase();
  }

  function hasGas() {
    return typeof google !== 'undefined' && google.script && google.script.run;
  }

  function loadExercises(gameKey, course, callbacks) {
    callbacks = callbacks || {};
    var onDone = callbacks.onDone || function () { };
    var onEmpty = callbacks.onEmpty || function () { };

    function finish(exercises, data) {
      if (!exercises || !exercises.length) {
        onEmpty(data);
        return;
      }
      onDone(exercises, data || {}, false);
    }

    if (!hasGas()) {
      onEmpty({ message: 'Chạy qua Google Apps Script để tải dữ liệu từ Sheet.' });
      return;
    }

    var handler = GAS_HANDLERS[gameKey];
    if (!handler || typeof google.script.run[handler] !== 'function') {
      onEmpty({ message: 'API game chưa sẵn sàng trên server.' });
      return;
    }

    google.script.run
      .withSuccessHandler(function (data) {
        var exercises = data && data.exercises ? data.exercises : [];
        finish(exercises, data);
      })
      .withFailureHandler(function (err) {
        onEmpty({
          message: 'Không tải được dữ liệu: ' +
            (err && err.message ? err.message : 'lỗi kết nối')
        });
      })[handler](course);
  }

  function createProgress(gameKey, course) {
    var progressUser = 'guest';

    function refreshProgressUser(serverUsername) {
      if (serverUsername) {
        progressUser = serverUsername;
        return;
      }
      try {
        var cached = sessionStorage.getItem('wewinUser');
        if (cached) {
          var u = JSON.parse(cached);
          if (u && u.username) {
            progressUser = u.username;
            return;
          }
        }
      } catch (err) { }
      progressUser = 'guest';
    }

    function getProgressKey() {
      return 'wewin_progress_' + gameKey + '_' + course + '_' + progressUser;
    }

    function pickStatus(a, b) {
      if (a === 'correct' || b === 'correct') return 'correct';
      if (a === 'wrong' || b === 'wrong') return 'wrong';
      return null;
    }

    function mergeStatuses(existing, incoming, total) {
      total = total || Math.max((existing && existing.length) || 0, (incoming && incoming.length) || 0);
      var merged = new Array(total);
      for (var i = 0; i < total; i++) {
        merged[i] = pickStatus(existing && existing[i], incoming && incoming[i]);
      }
      return merged;
    }

    function readLocal() {
      try {
        var saved = JSON.parse(localStorage.getItem(getProgressKey()));
        if (saved && saved.statuses && saved.statuses.length) return saved.statuses;
      } catch (err) { }
      return null;
    }

    function saveLocal(statuses) {
      localStorage.setItem(getProgressKey(), JSON.stringify({ statuses: statuses }));
    }

    function save(statuses, reset) {
      saveLocal(statuses);
      if (hasGas()) {
        google.script.run
          .withSuccessHandler(function (data) {
            if (data && data.statuses) saveLocal(data.statuses);
          })
          .saveGameProgress(course, gameKey, statuses, !!reset);
      }
    }

    function applyFromServer(data, total) {
      refreshProgressUser(data && data.username);
      var local = readLocal();
      if (data && data.loggedIn && data.statuses) {
        var merged = local ? mergeStatuses(data.statuses, local, total) : data.statuses.slice();
        saveLocal(merged);
        return merged;
      }
      if (local) return mergeStatuses(local, new Array(total).fill(null), total);
      return new Array(total).fill(null);
    }

    function countStats(statuses) {
      var correct = 0, wrong = 0, pending = 0;
      statuses.forEach(function (s) {
        if (s === 'correct') correct++;
        else if (s === 'wrong') wrong++;
        else pending++;
      });
      return { correct: correct, wrong: wrong, pending: pending };
    }

    return {
      refreshProgressUser: refreshProgressUser,
      applyFromServer: applyFromServer,
      readLocal: readLocal,
      save: save,
      countStats: countStats
    };
  }

  function navigateHome(course) {
    if (hasGas()) {
      google.script.run.withSuccessHandler(function (url) {
        var base = (url || '').replace(/\?.*$/, '').replace(/\/$/, '');
        var dest = base + (course ? '?course=' + encodeURIComponent(course) : '');
        window.top.location.href = dest;
      }).getAppUrl();
    } else {
      window.location.href = 'index.html' + (course ? '?course=' + encodeURIComponent(course) : '');
    }
  }

  function initSidebar(homeOnly) {
    var menuBtn = document.getElementById('btnMobileMenu');
    var backdrop = document.getElementById('sidebarBackdrop');
    if (menuBtn) {
      menuBtn.addEventListener('click', function () {
        document.getElementById('appShell').classList.toggle('sidebar-open');
        if (backdrop) backdrop.classList.toggle('hidden');
      });
    }
    if (backdrop) {
      backdrop.addEventListener('click', function () {
        document.getElementById('appShell').classList.remove('sidebar-open');
        backdrop.classList.add('hidden');
      });
    }
    var navHome = document.getElementById('navHome');
    if (navHome) {
      navHome.addEventListener('click', function (e) {
        e.preventDefault();
        navigateHome(readUrlCourseParam());
      });
    }
    if (hasGas()) {
      google.script.run.withSuccessHandler(function (src) {
        if (src) {
          var logo = document.getElementById('sidebarLogo');
          if (logo) logo.src = src;
        }
      }).getLogoSrc();
    }
    if (homeOnly) return;
  }

  function renderExerciseList(containerId, exercises, statuses, onOpen) {
    var html = '';
    exercises.forEach(function (ex, i) {
      var st = statuses[i] || 'pending';
      var statusClass = st === 'correct' ? 'status-correct' : st === 'wrong' ? 'status-wrong' : 'status-pending';
      var icon = st === 'correct' ? '<i class="fas fa-check"></i>' :
        st === 'wrong' ? '<i class="fas fa-times"></i>' : '<i class="far fa-circle"></i>';
      var label = ex.title || ex.id || ('Bài ' + (i + 1));
      var sub = (ex.items ? ex.items.length : 0) + ' câu';
      if (ex.instruction) sub += ' · ' + ex.instruction;
      html += '<div class="q-list-item ' + statusClass + '" data-index="' + i + '">' +
        '<span class="q-num">' + (i + 1) + '</span>' +
        '<span class="q-preview"><strong>' + escapeHtml(label) + '</strong><br><small style="color:#9e9e9e;font-weight:600">' +
        escapeHtml(sub) + '</small></span>' +
        '<span class="q-status">' + icon + '</span></div>';
    });
    document.getElementById(containerId).innerHTML = html;
    document.querySelectorAll('#' + containerId + ' .q-list-item').forEach(function (item) {
      item.addEventListener('click', function () {
        onOpen(parseInt(this.getAttribute('data-index'), 10));
      });
    });
  }

  function updateListStats(stats, total) {
    var ids = ['statTotal', 'statCorrect', 'statWrong', 'statPending'];
    var vals = [total, stats.correct, stats.wrong, stats.pending];
    ids.forEach(function (id, i) {
      var el = document.getElementById(id);
      if (el) el.textContent = vals[i];
    });
  }

  function showSampleBadge(show) {
    var el = document.getElementById('sampleDataBadge');
    if (!el) return;
    if (show) el.classList.remove('hidden');
    else el.classList.add('hidden');
  }

  function getExerciseMaxScore(exercises, scoreState) {
    return WewinGameUI.resolveExerciseMaxScore(scoreState, exercises);
  }

  function refreshScoreMeta(sessionScore, maxScore, fillId, scoreId) {
    WewinGameUI.updateScoreBar({
      sessionScore: sessionScore,
      maxScore: maxScore,
      fillEl: document.getElementById(fillId),
      scoreEl: document.getElementById(scoreId)
    });
  }

  function updateExerciseCounter(el, current, total, unit) {
    WewinGameUI.updateQuestionCounter(el, current, total, unit || 'Bài');
  }

  function autoAdvanceExercise(fn, delayMs) {
    WewinGameUI.autoAdvanceSafe(fn, delayMs);
  }

  function createScoreState() {
    return { questionTotal: 0, unitTotal: 0, maxScore: 0 };
  }

  function applyServerScore(data, scoreState) {
    WewinGameUI.applyGameDataScores(scoreState, data);
    return WewinGameUI.applySessionScore(0, data);
  }

  function resolveExerciseTotal(scoreState, exercises) {
    if (scoreState && scoreState.questionTotal > 0) return scoreState.questionTotal;
    return exercises ? exercises.length : 0;
  }

  return {
    readUrlCourseParam: readUrlCourseParam,
    escapeHtml: escapeHtml,
    shuffleArray: shuffleArray,
    normalizeWord: normalizeWord,
    hasGas: hasGas,
    loadExercises: loadExercises,
    createProgress: createProgress,
    navigateHome: navigateHome,
    initSidebar: initSidebar,
    renderExerciseList: renderExerciseList,
    updateListStats: updateListStats,
    showSampleBadge: showSampleBadge,
    getExerciseMaxScore: getExerciseMaxScore,
    refreshScoreMeta: refreshScoreMeta,
    updateExerciseCounter: updateExerciseCounter,
    autoAdvanceExercise: autoAdvanceExercise,
    createScoreState: createScoreState,
    applyServerScore: applyServerScore,
    resolveExerciseTotal: resolveExerciseTotal,
    LOADING_HTML: (typeof WewinGameUI !== 'undefined' && WewinGameUI.LOADING_HTML)
      ? WewinGameUI.LOADING_HTML
      : '<div class="data-loading-state"><i class="fas fa-gear fa-spin" aria-hidden="true"></i> đang tải dữ liệu</div>'
  };
})();
</script>
